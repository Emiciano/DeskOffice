name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -T 15 -p "${SSH_PORT:-22}" "$SSH_HOST" 2>/dev/null | tee -a ~/.ssh/known_hosts
          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "ERROR: ssh-keyscan returned no host key. Check SSH_HOST/SSH_PORT and server firewall."
            exit 1
          fi

      - name: Ensure target directory exists
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" "mkdir -p '${DEPLOY_PATH}'"

      - name: Create backup of current release
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" "\
            mkdir -p '${DEPLOY_PATH}.backup'; \
            rsync -az --delete --exclude '.pm2' '${DEPLOY_PATH}/' '${DEPLOY_PATH}.backup/'"

      - name: Deploy dist to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -az --delete -e "ssh -p ${SSH_PORT:-22}" dist/ "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/"

      - name: Start or restart PM2 app
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          PM2_APP_NAME: portfolio-cms
        run: |
          ssh -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" "\
            export PM2_HOME='${DEPLOY_PATH}/.pm2'; \
            mkdir -p \"${DEPLOY_PATH}\" \"$PM2_HOME\" \"$PM2_HOME/logs\" \"$PM2_HOME/pids\"; \
            touch \"$PM2_HOME/pm2.log\" \"$PM2_HOME/pm2.pid\"; \
            if pm2 describe '${PM2_APP_NAME}' > /dev/null 2>&1; then \
              pm2 restart '${PM2_APP_NAME}'; \
            else \
              pm2 serve '${DEPLOY_PATH}' 3050 --name '${PM2_APP_NAME}' --spa; \
            fi; \
            pm2 save"

      - name: Healthcheck and rollback on failure
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          PM2_APP_NAME: portfolio-cms
        run: |
          ssh -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" "\
            set -e; \
            if curl -fsS --max-time 10 http://127.0.0.1:3050/ > /dev/null; then \
              echo 'Healthcheck passed'; \
            else \
              echo 'Healthcheck failed, rolling back'; \
              rsync -az --delete --exclude '.pm2' '${DEPLOY_PATH}.backup/' '${DEPLOY_PATH}/'; \
              export PM2_HOME='${DEPLOY_PATH}/.pm2'; \
              pm2 restart '${PM2_APP_NAME}'; \
              pm2 save; \
              exit 1; \
            fi"
